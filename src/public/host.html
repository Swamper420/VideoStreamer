<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>VideoStreamer Host</title>
    <link rel="stylesheet" href="/assets/app.css" />
  </head>
  <body>
    <main class="shell shell-wide">
      <section class="panel panel-stack">
        <div class="row">
          <div>
            <p class="eyebrow">Host</p>
            <h1>Start a streaming session</h1>
          </div>
          <a class="button button-secondary" href="/">Home</a>
        </div>
        <label class="field">
          <span>Host name</span>
          <input id="host-name" type="text" value="Host" maxlength="80" />
        </label>
        <button id="start-session" class="button">Create session and capture a screen</button>
        <p id="host-status" class="status">Waiting to start.</p>
        <div id="session-card" class="panel panel-muted hidden">
          <p class="eyebrow">Invite</p>
          <p>Share this link with viewers:</p>
          <input id="viewer-link" type="text" readonly />
          <p id="codec-summary" class="status"></p>
        </div>
      </section>

      <section class="video-layout">
        <section class="panel panel-stack">
          <div class="row">
            <div>
              <p class="eyebrow">Live preview</p>
              <h2>Your shared stream</h2>
            </div>
            <span id="viewer-count" class="badge">0 viewers</span>
          </div>
          <video id="host-preview" autoplay muted playsinline></video>
        </section>

        <section class="panel panel-stack">
          <p class="eyebrow">Forwarded input</p>
          <h2>Last viewer actions</h2>
          <ul id="input-log" class="input-log"></ul>
        </section>
      </section>
    </main>
    <script type="module" src="/assets/host.js"></script>
  </body>
</html>
